<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>


    <!-- Tailwind and Daisy UI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>


    <section class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-4">
        <!-- All jobs Button -->
        <button id="btn-all-filter" class="col-span-2 md:col-span-1 cursor-pointer bg-blue-500 text-white py-2 px-4 rounded-sm 
               hover:border-2 hover:border-blue-700 transition-all duration-300">
            All
        </button>

        <!-- Interview Filter Button -->
        <button id="btn-interview-filter" class="cursor-pointer bg-gray-200 text-gray-800 py-2 px-4 rounded-sm 
               hover:border-2 hover:border-green-500 transition-all duration-300">
            Interview
        </button>

        <!-- Rejected filter Button -->
        <button id="btn-rejected-filter" class="cursor-pointer bg-gray-200 text-gray-800 py-2 px-4 rounded-sm 
               hover:border-2 hover:border-red-500 transition-all duration-300">
            Rejected
        </button>
    </section>


</body>

</html>
