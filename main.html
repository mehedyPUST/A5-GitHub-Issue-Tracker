<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>


    <!-- Tailwind and Daisy UI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <!-- navbar...................................  -->
    <nav class="navbar bg-base-100 flex-col md:flex-row gap-4 justify-between shadow-sm w-11/12 md:w-39/40 mx-auto">
        <div class="flex items-center gap-2 ">
            <img class="w-9" src="./assets/github-logo.png" alt="">
            <a class=" text-xl font-bold ">Github Issues Tracker</a>
        </div>
        <div class="flex gap-2">
            <div class="relative">
                <input id="searchInput" type="text" placeholder="Search issues..."
                    class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
            </div>
            <div>
                <button class="btn btn-primary w-40">+ New Issue</button>
            </div>

        </div>
    </nav>
    <!-- .......................................... -->

    <main class=" w-11/12 mx-auto">
        <!-- button section  -->
        <section class=" bg-gray-100 p-4 shadow-sm grid grid-cols-2 md:grid-cols-3 gap-4 mb-4 mt-5 rounded-sm">
            <button id="allIssuesBtn" class="btn btn-primary  col-span-2 md:col-span-1 cursor-pointer">All</button>
            <button id="openIssuesBtn" class="btn btn-outline ">Open</button>
            <button id="closedIssuesBtn" class="btn btn-outline ">Closed</button>
        </section>

        <!-- ............................................. -->

        <section class=" bg-gray-100 p-4 shadow-sm flex justify-between items-center mt-5 rounded-sm">

            <div class="left-side flex gap-2 items-center ">
                <div class="img bg-purple-200 rounded-full p-2">
                    <img src="./assets/Aperture.png" alt="">
                </div>
                <div class="counter-text ">
                    <h2 class="text-[20px] font-bold"><span id="total-issues">0</span> <span>Issues</span></h2>
                    <p>Track and manage your project issues</p>
                </div>
            </div>



            <div class="right-side flex gap-4 ">

                <div>
                    <span class="text-green-600"><i class="fa-solid fa-circle"></i> </span>
                    <span>Open</span>
                </div>
                <div>
                    <span class="text-purple-600"><i class="fa-solid fa-circle"></i> </span>
                    <span>Closed</span>
                </div>

            </div>

        </section>


        <section id="issues-container"
            class=" bg-gray-100 p-2 md:p-4 shadow-sm  mt-5 rounded-sm grid grid-cols-1  md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">

        <section id="loading-spinner" class="hidden justify-center items-center col-span-4 py-20">
            <span class="loading loading-spinner loading-lg text-primary"></span>
        </section>
    </main>



    <script src="./main.js"></script>
</body>

</html>
