<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>


    <!-- Tailwind and Daisy UI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <!-- navbar...................................  -->
    <nav class="navbar bg-base-100 flex justify-between shadow-sm w-39/40 mx-auto">
        <div class="flex items-center gap-2 ">
            <img class="w-[36px]" src="./assets/github-logo.png" alt="">
            <a class=" text-xl font-bold ">Github Issues Tracker</a>
        </div>
        <div class="flex gap-2">
            <div class="relative">
                <input type="text" placeholder="Search issues..."
                    class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
            </div>
            <div>
                <button class="btn btn-primary">+ New Issue</button>
            </div>

        </div>
    </nav>
    <!-- .......................................... -->

    <main class=" w-11/12 mx-auto">
        <!-- button section  -->
        <section class=" bg-gray-100 p-4 shadow-sm flex gap-4 mt-5 rounded-sm">
            <button class="btn btn-primary w-40">All</button>
            <button class="btn btn-outline w-40">Open</button>
            <button class="btn btn-outline w-40">Closed</button>
        </section>

        <!-- ............................................. -->

        <section class=" bg-gray-100 p-4 shadow-sm flex gap-4 mt-5 rounded-sm">
            <div class="counter flex justify-between">
                <div class="left-side flex gap-2 items-center ">
                    <div class="img bg-purple-200 rounded-full p-2">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div class="counter-text ">
                        <h2 class="text-[20px] font-bold"><span id="total-issues">0</span> <span>Issues</span></h2>
                        <p>Track and manage your project issues</p>
                    </div>
                </div>

                <div class="right-side ">

                </div>
            </div>
        </section>


    </main>

</body>

</html>
