<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>


    <!-- Tailwind and Daisy UI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>


<body class="min-h-screen flex items-center justify-center bg-gray-100">
    <main class=" w-11/12 md:w-4/12 mx-auto shadow-sm rounded-md p-4  space-y-5 ">


        <div class="card bg-base-100  shadow-sm">
            <figure class="px-10 pt-10">
                <img src="./assets/github-logo.png" alt="github-logo" class="rounded-xl" />
            </figure>
            <div class="card-body items-center text-center">
                <h2 class="card-title">GitHub Issues Tracker</h2>
                <p>Sign in to manage your issues</p>

            </div>
        </div>


        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box border p-4">
            <legend class="fieldset-legend">Login</legend>

            <label class="label">Username</label>
            <input id="user-name" type="text" class="input w-full" placeholder="Enter Username" />
            <p class="text-purple-600">Default Username: admin </p>

            <label class="label">Password</label>
            <input id="login-password" type="password" class="input w-full" placeholder="Enter Password" />
            <p class="text-purple-600">Default Password: admin123 </p>

            <button id="btn-signIn" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>



    </main>





    <script src="./login.js"></script>
</body>

</html>
